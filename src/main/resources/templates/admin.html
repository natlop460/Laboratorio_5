<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JustDoIt!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />


</head>

<body>

<div class="container">

    <!-- Left column -->
    <aside class="sidebar">

        <!-- Logo area -->
        <div class="logo">
            <a th:href="@{/}"><img th:src="@{/images/JustDoIt.png}" alt="JustDoIt Logo" width="200" height="200"></a>
        </div>

        <!-- Navigation area -->
        <nav class="navigation">
            <h3>Opciones</h3>
            <ul>
                <li>
                    <strong>Inicio</strong>
                </li>
                <li>
                    <a th:href="@{/user/tasks}">Tareas de usuario actual</a>
                </li>
                <li>
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <button type="submit" class="link-button">Cerrar sesión</button>
                    </form>
                </li>
            </ul>
        </nav>

    </aside>

    <!-- Right column -->
    <main class="content">
        <h1>Area Administrativa</h1>


    </main>

</div>

</body>
</html>
